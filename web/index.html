<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Diário de filmes de 2025+ bem avaliados pela crítica — Metacritic e Rotten Tomatoes."
    />
    <meta name="theme-color" content="#0a0805" />

    <!-- Ícone do app + instalação como web app (iOS/Android) -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aclamados" />

    <title>Aclamados — filmes bem avaliados desde 2025</title>
    <script>
      // Aplica o tema salvo antes da primeira pintura (evita flash de cor errada).
      (function () {
        try {
          var t = localStorage.getItem("filmes-aclamados:tema") || "escuro";
          var ef = t === "sistema"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "escuro" : "claro")
            : t;
          document.documentElement.dataset.tema = ef;
        } catch (e) {
          document.documentElement.dataset.tema = "escuro";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
